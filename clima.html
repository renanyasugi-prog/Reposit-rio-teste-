<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsão 60 Dias - AgroPalmital</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo"><i class="fas fa-leaf"></i> <h1>Agro<span>Palmital</span></h1></div>
            <a href="index.html" class="btn-calc" style="text-decoration:none; width:auto; padding: 10px 20px;">Voltar</a>
        </div>
    </header>

    <main class="container" style="margin-top: 30px;">
        <h2 class="title-decorated">Tendência para os Próximos 60 Dias</h2>
        <div class="card-agro" style="background: var(--green-dark); color: white; display: flex; justify-content: space-around; padding: 20px;">
            <div style="text-align:center;"><i class="fas fa-cloud-rain" style="color:var(--soy-gold)"></i><p>Chuva: 165mm</p></div>
            <div style="text-align:center;"><i class="fas fa-temperature-low" style="color:var(--soy-gold)"></i><p>Média: 21°C</p></div>
        </div>

        <div class="card-agro">
            <table style="width:100%; border-collapse: collapse;">
                <tr style="background:var(--green-leaf); color:white;">
                    <th style="padding:10px;">Período</th>
                    <th style="padding:10px;">Condição</th>
                </tr>
                <tr><td style="padding:10px; border-bottom:1px solid #eee;">Abril (Final)</td><td style="padding:10px; border-bottom:1px solid #eee;">Tempo seco e ensolarado</td></tr>
                <tr><td style="padding:10px; border-bottom:1px solid #eee;">Maio (Início)</td><td style="padding:10px; border-bottom:1px solid #eee;">Chuvas isoladas</td></tr>
                <tr><td style="padding:10px; border-bottom:1px solid #eee;">Maio (Final)</td><td style="padding:10px; border-bottom:1px solid #eee;">Queda brusca de temperatura</td></tr>
            </table>
        </div>
    </main>
</body>
</html>
