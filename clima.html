<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Palmital - Agrinho 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --agro: #1b4332; --gold: #d4a017; --blue: #3498db; }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; overflow: hidden; }
        .header { background: var(--agro); color: white; padding: 25px; text-align: center; }
        .conteudo { padding: 25px; text-align: center; }
        .temp-foco { font-size: 4rem; font-weight: 700; color: var(--agro); margin: 5px 0; }
        .dica-box { background: #f0fdf4; border-left: 5px solid var(--gold); padding: 15px; border-radius: 10px; text-align: left; margin: 20px 0; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .dia { background: #f8f9fa; padding: 10px; border-radius: 12px; border: 1px solid #eee; text-align: center; }
        .btn { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <span style="background:var(--gold); padding:3px 10px; border-radius:10px; font-size:0.7rem; font-weight:700;">AGRINHO 2026</span>
        <h2 style="margin:10px 0 0;">Palmital, PR</h2>
        <p id="data-atual" style="margin:0; opacity:0.8; font-size:0.8rem;">--/--</p>
    </div>

    <div class="conteudo">
        <div id="icon-hoje"><i class="fas fa-sync fa-spin"></i></div>
        <div class="temp-foco" id="temp-agora">--°C</div>
        <p id="desc-agora" style="font-weight:600; color:#444;">Buscando satélite...</p>

        <div class="dica-box">
            <h4 style="margin:0 0 5px; font-size:0.8rem; color:var(--agro);"><i class="fas fa-leaf"></i> Dica de Manejo:</h4>
            <p id="texto-dica" style="font-size:0.75rem; color:#2d6a4f; margin:0;">Calculando condições ideais...</p>
        </div>

        <h4 style="text-align:left; font-size:0.8rem; color:#999; margin-bottom:10px;">PREVISÃO 4 DIAS</h4>
        <div class="grid" id="previsao-grid"></div>

        <a href="index.html" class="btn"><i class="fas fa-chevron-left"></i> Voltar</a>
    </div>
</div>

<script>
async function rodarClima() {
    try {
        const lat = -24.89; const lon = -52.20;
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,precipitation_probability_max&timezone=America%2FSao_Paulo`;
        
        const res = await fetch(url);
        const data = await res.json();
        const atual = data.current_weather;

        // Atualiza Hoje
        document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR', {day:'numeric', month:'long'});
        document.getElementById('temp-agora').innerText = Math.round(atual.temperature) + "°C";
        
        // Lógica de Dica Técnica
        let dica = "Tempo bom para o campo.";
        if(atual.windspeed > 12) dica = "Vento forte! Evite pulverizar para evitar deriva e proteger a fauna.";
        if(atual.weathercode >= 51) dica = "Chuva prevista. Não aplique defensivos agora para evitar lavagem do solo.";
        document.getElementById('texto-dica').innerText = dica;

        // Próximos 4 Dias
        const grid = document.getElementById('previsao-grid');
        grid.innerHTML = '';
        for (let i = 1; i <= 4; i++) {
            const dia = new Date(data.daily.time[i]).toLocaleDateString('pt-BR', {weekday:'short'}).toUpperCase();
            const prob = data.daily.precipitation_probability_max[i];
            grid.innerHTML += `
                <div class="dia">
                    <span style="font-size:0.6rem; font-weight:700;">${dia}</span>
                    <i class="fas fa-cloud-sun" style="display:block; margin:5px 0; color:var(--agro);"></i>
                    <div style="font-weight:700;">${Math.round(data.daily.temperature_2m_max[i])}°</div>
                    <div style="font-size:0.55rem; color:var(--blue);"><i class="fas fa-tint"></i> ${prob}%</div>
                </div>`;
        }
    } catch (e) { console.log("Erro no satélite"); }
}
window.onload = rodarClima;
</script>
</body>
</html>
