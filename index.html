<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroPalmital - Painel Agrinho 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --verde-agro: #2d6a4f; 
            --marrom-agro: #4b3621; 
            --gold: #d4a017;
            --bege-card: rgba(253, 250, 245, 0.96);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://png.pngtree.com/thumb_back/fh260/background/20241019/pngtree-vibrant-green-rows-of-young-corn-plants-growing-in-a-field-image_16418004.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        .header {
            background-color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--verde-agro);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-weight: 700; font-size: 1.6rem; color: #333; }
        .logo span { color: var(--verde-agro); }
        
        .header-right { display: flex; gap: 30px; align-items: center; }
        .relogio-box { color: var(--marrom-agro); font-weight: 700; font-size: 1.1rem; }

        .dolar-link {
            text-decoration: none;
            color: var(--verde-agro);
            font-weight: 800;
            border: 2px solid var(--verde-agro);
            padding: 8px 20px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            padding: 40px;
            max-width: 1300px;
            margin: auto;
        }

        .card {
            background-color: var(--bege-card);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        .card-title {
            font-weight: 700;
            margin-bottom: 15px;
            display: flex; align-items: center; gap: 12px;
            color: var(--marrom-agro);
            border-bottom: 2px solid rgba(0,0,0,0.1);
            padding-bottom: 10px;
        }

        .price-button {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; margin-bottom: 10px;
            background: var(--verde-agro); color: white;
            text-decoration: none; border-radius: 15px;
            font-weight: 700; transition: 0.3s;
            animation: pulse-button 3s infinite;
        }

        @keyframes pulse-button {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .price-button:hover { background: var(--marrom-agro); }

        .clima-btn {
            background: white; padding: 20px; border-radius: 15px;
            display: flex; align-items: center; justify-content: space-between;
            text-decoration: none; color: var(--verde-agro);
            border: 2px solid var(--verde-agro);
        }

        /* Grid interna para a calculadora de safra ficar organizada */
        .safra-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-family: 'Poppins'; }
        
        .btn-flex { display: flex; gap: 10px; margin-top: 10px; }
        .btn { padding: 15px; border-radius: 12px; border: none; color: white; font-weight: 700; cursor: pointer; text-transform: uppercase; flex: 3; }
        .btn-clear { background: #666; flex: 1; font-size: 0.8rem; border-radius: 12px; border:none; color: white; cursor:pointer;}
        
        .btn-marrom { background: var(--marrom-agro); }
        .btn-verde { background: var(--verde-agro); }
        .btn-gold { background: var(--gold); }

        .result-box { margin-top: 15px; padding: 15px; background: white; border-radius: 12px; text-align: center; font-weight: 700; color: var(--verde-agro); border: 1px dashed var(--verde-agro); }

        footer { background: rgba(255,255,255,0.9); padding: 20px; text-align: center; margin-top: 40px; border-top: 5px solid var(--gold); }

        @media (max-width: 850px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo"><i class="fas fa-leaf"></i> Agro<span>Palmital</span></div>
        <div class="header-right">
            <div class="relogio-box"><i class="far fa-clock"></i> <span id="clock">00:00:00</span></div>
            <a href="https://br.tradingview.com/symbols/USDBRL/" target="_blank" class="dolar-link">DÓLAR COMERCIAL <i class="fas fa-chart-line"></i></a>
        </div>
    </header>

    <main class="main-container">
        
        <section class="col">
            <div class="card">
                <div class="card-title"><i class="fas fa-cloud-sun"></i> Clima Palmital</div>
                <a href="https://www.tempo.com/palmital_parana-l116212.htm" target="_blank" class="clima-btn">
                    <div><i class="fas fa-sun fa-3x" style="color: var(--gold);"></i></div>
                    <div style="text-align: right;"><span style="font-size: 1.1rem; font-weight: 800;">VER CLIMA REAL</span><br>Palmital - PR</div>
                </a>
            </div>

            <div class="card" style="margin-top: 25px;">
                <div class="card-title"><i class="fas fa-gas-pump"></i> Gasto de Diesel</div>
                <input type="number" id="cons" placeholder="Consumo (L/Hora)">
                <input type="number" id="rend" placeholder="Rendimento (Ha/Hora)">
                <div class="btn-flex">
                    <button class="btn btn-marrom" onclick="calcDiesel()">Analisar</button>
                    <button class="btn btn-clear" onclick="clearField('cons','rend','res-diesel')">LIMPAR</button>
                </div>
                <div class="result-box" id="res-diesel">L/Ha: --</div>
            </div>

            <div class="card" style="margin-top: 25px;">
                <div class="card-title"><i class="fas fa-ruler-combined"></i> Conversor de Áreas</div>
                <input type="number" id="alq" placeholder="Alqueires Paulistas">
                <div class="btn-flex">
                    <button class="btn btn-gold" onclick="calcArea()">Converter</button>
                    <button class="btn btn-clear" onclick="clearField('alq','','res-area')">LIMPAR</button>
                </div>
                <div class="result-box" id="res-area">Resultado: -- Ha</div>
            </div>
        </section>

        <section class="col">
            <div class="card">
                <div class="card-title"><i class="fas fa-chart-line"></i> Mercado Coprossel 2026</div>
                <a href="https://www.coprossel.com.br/precos?ano=2026&mes=4&dia=Selecione..." target="_blank" class="price-button">SOJA (60KG) <i class="fas fa-external-link-alt"></i></a>
                <a href="https://www.coprossel.com.br/precos?ano=2026&mes=4&dia=Selecione..." target="_blank" class="price-button">MILHO (60KG) <i class="fas fa-external-link-alt"></i></a>
                <a href="https://www.coprossel.com.br/precos?ano=2026&mes=4&dia=Selecione..." target="_blank" class="price-button">TRIGO (60KG) <i class="fas fa-external-link-alt"></i></a>
            </div>

            <div class="card" style="margin-top: 25px;">
                <div class="card-title"><i class="fas fa-calculator"></i> Estimativa Técnica de Safra</div>
                <div class="safra-grid">
                    <input type="number" id="pl_m" placeholder="Plantas p/ metro">
                    <input type="number" id="vg_pl" placeholder="Vagens p/ planta">
                    <input type="number" id="gr_vg" placeholder="Grãos p/ vagem">
                    <input type="number" id="pmg" placeholder="PMG (g)">
                    <input type="number" id="espac" placeholder="Espaçamento (m)">
                </div>
                <div class="btn-flex">
                    <button class="btn btn-verde" onclick="calcSafraTecnica()">CALCULAR PREVISÃO</button>
                    <button class="btn btn-clear" onclick="clearSafra()">LIMPAR</button>
                </div>
                <div class="result-box" id="res-safra-tec">Estimativa: -- sc/ha</div>
            </div>
        </section>
    </main>

    <footer>
        <p><i class="fas fa-trophy" style="color: var(--gold);"></i> Projeto Agrinho 2026 | Palmital, PR</p>
    </footer>

    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

        // NOVA FUNÇÃO COM A FÓRMULA: (Plantas_m * Vagens_Planta * Graos_Vagem * PMG) / (Espaçamento * 600)
        function calcSafraTecnica() {
            const plM = parseFloat(document.getElementById('pl_m').value);
            const vgPl = parseFloat(document.getElementById('vg_pl').value);
            const grVg = parseFloat(document.getElementById('gr_vg').value);
            const pmg = parseFloat(document.getElementById('pmg').value);
            const espac = parseFloat(document.getElementById('espac').value);

            if(plM && vgPl && grVg && pmg && espac) {
                // Cálculo da fórmula técnica
                const resultado = (plM * vgPl * grVg * pmg) / (espac * 600);
                document.getElementById('res-safra-tec').innerText = "Previsão: " + resultado.toFixed(1) + " sc/ha";
            } else {
                alert("Por favor, preencha todos os campos da estimativa.");
            }
        }

        function clearSafra() {
            document.getElementById('pl_m').value = "";
            document.getElementById('vg_pl').value = "";
            document.getElementById('gr_vg').value = "";
            document.getElementById('pmg').value = "";
            document.getElementById('espac').value = "";
            document.getElementById('res-safra-tec').innerText = "-- sc/ha";
        }

        function calcDiesel() {
            const c = document.getElementById('cons').value;
            const r = document.getElementById('rend').value;
            if(c && r) document.getElementById('res-diesel').innerText = "Gasto: " + (c/r).toFixed(2) + " L/Ha";
        }

        function calcArea() {
            const a = document.getElementById('alq').value;
            if(a) document.getElementById('res-area').innerText = (a * 2.42).toFixed(2) + " Hectares";
        }

        function clearField(id1, id2, resId) {
            if(id1) document.getElementById(id1).value = "";
            if(id2) document.getElementById(id2).value = "";
            document.getElementById(resId).innerText = "--";
        }
    </script>
</body>
</html>
